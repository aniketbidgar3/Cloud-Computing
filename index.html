<!DOCTYPE html>
<html lang="en">

<head>
    <title>Assignment 2 - Web Page</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="../css/style.css" rel="stylesheet" />
    <script type="text/javascript" src="../javascript/script.js"></script>
    <style>
        body {
            background-color: #f0f2f5;

        }

        .signIn {
            margin: 100px 175px;
        }

        input {
            width: 364px;
            height: 52px;
            border-radius: 10px;
            align-items: center;
        }

        button {
            width: 364px;
            height: 48px;
            border-radius: 10px;
            border: none;
        }

        .signupButton {
            width: 192px;
            height: 48px;
            align-items: center;
            background-color: #42b72a;

        }

        .left img {
            float: left;
            width: 400px;
            margin-left: 200px;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            display: block;
            /* border: 1px solid black; */

        }

        .right * {
            margin: 0 auto;
            display: block;
            font-size: medium;
        }

        .right {
            float: right;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            border-radius: 10px;
            background-color: white;

        }

        .forgot {
            padding-left: 130px;
            text-decoration: none;
        }

        input {
            border: 1px solid grey;

        }
    </style>
</head>

<body>

    <div class="signIn">
        <marquee vspace="30px" style="font-size:larger">WELCOME TO MY FIRST WEB PAGE ...... </marquee>
        <div class="left">
            <img src="https://w0.peakpx.com/wallpaper/453/613/HD-wallpaper-captain-america-captain-infinity-war-steve-rogers.jpg" alt="Welcome" />
        </div>

        <div class="right">
            <form action="">

                <input type="text" value="" placeholder="Username" />
                <br />
                <br />
                <input type="password" name="" value="" placeholder="Password" />
                <br />
                <br />

                <button type="button" id="LogIn" style="background-color: #1877f2;">Log
                    in</button>
                <br />
                <br />
                <div class="forgot">
                    <a style="text-decoration:none" href="">forgotten password ?</a>
                </div>

                <br />
                <br />
                <br />
                <hr />
                <br />
                <button class="signupButton" type="">
                    <a href="./signup.html"></a> Create New Account
                </button>
            </form>

        </div>
    </div>
</body>

</html>
